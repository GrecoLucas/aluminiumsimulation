<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estúdio de Inspeção 3D</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Loading Screen -->
    <div id="loading"
        style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; display: none; z-index: 1000; font-family: 'Inter', sans-serif; font-weight: 500; padding: 15px 30px; background: rgba(0,0,0,0.7); border-radius: 8px;">
        A carregar modelo...
    </div>

    <!-- Interface Lil-GUI (carregada via JS) -->

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
            }
        }
    </script>

    <script type="module" src="main.js"></script>
</body>

</html>
